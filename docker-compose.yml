services:
  cfusa:
    build: .
    image: cfusa:local
    volumes:
      - .:/project
    working_dir: /project

  # Full pipeline: check → trace → qualify → release
  pipeline:
    build: .
    image: cfusa:local
    volumes:
      - .:/project
    working_dir: /project
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        echo "=== cfusa pipeline ==="
        cfusa check --dir /project/src --format sarif --output /project/results.sarif
        cfusa trace --dir /project --gaps
        cfusa qualify --dir /project
        cfusa release --dir /project --full
        echo "=== pipeline complete ==="
