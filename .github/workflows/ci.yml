name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc
          - os: ubuntu-22.04
            compiler: clang
            cc: clang-15
          - os: macos-14
            compiler: clang
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake build-essential lcov

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake lcov

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -V

      - name: Self-check (cfusa check on cfusa source)
        run: |
          ./build/cfusa check --dir . --format json --output cfusa-self-check.json || true
          ./build/cfusa version

      - name: Upload self-check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cfusa-self-check-${{ matrix.os }}-${{ matrix.compiler }}
          path: cfusa-self-check.json

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake gcc lcov

      - name: Configure with coverage
        run: |
          cmake -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

      - name: Build
        run: cmake --build build-cov --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build-cov --output-on-failure

      - name: Generate lcov report
        run: |
          lcov --capture --directory build-cov --output-file coverage.info \
            --rc lcov_branch_coverage=1
          lcov --remove coverage.info '/usr/*' '*/vendor/*' '*/tests/*' \
            --output-file coverage.info
          lcov --list coverage.info

      - name: cfusa coverage analysis
        run: ./build-cov/cfusa coverage --lcov coverage.info --threshold 68

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.info

  sarif-upload:
    name: SARIF Upload
    runs-on: ubuntu-22.04
    needs: build-and-test
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y cmake

      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel

      - name: Generate SARIF report
        run: |
          ./build/cfusa check --dir . --format sarif --output results.sarif || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cfusa:ci .

      - name: Smoke test Docker image
        run: docker run --rm cfusa:ci version

      - name: Self-check via Docker
        run: |
          docker run --rm -v "$(pwd)":/workspace cfusa:ci check \
            --dir /workspace/src --format json --output /workspace/cfusa-docker-check.json || true

      - name: Upload Docker self-check
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cfusa-docker-check
          path: cfusa-docker-check.json

  qualify:
    name: Self-qualification
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y cmake gcc

      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel

      - name: Run self-qualification
        run: ./build/cfusa qualify --binary ./build/cfusa --format json --output .cfusa_qualification.json

      - name: Run trace coverage check
        run: ./build/cfusa trace --dir . --format json --output trace-report.json || true

      - name: Run ISO 26262 gap report
        run: |
          ./build/cfusa iso26262 --dir . --format json --output iso26262-gap-report.json || true

      - name: Run HARA validation
        run: |
          ./build/cfusa hara show --dir . || true

      - name: docs — version consistency check
        run: |
          # Verify README and CHANGELOG mention current version
          VERSION=$(./build/cfusa version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "Checking version $VERSION in docs"
          grep -q "$VERSION" CHANGELOG.md || echo "WARN: $VERSION not in CHANGELOG.md"
          grep -q "$VERSION" README.md    || echo "WARN: $VERSION not in README.md"

      - name: Upload qualification record
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qualification-record
          path: |
            .cfusa_qualification*.json
            iso26262-gap-report.json
            trace-report.json
